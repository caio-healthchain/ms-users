name: Build and Push Docker Image to ACR

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  ACR_NAME: lazarusimages
  ACR_LOGIN_SERVER: lazarusimages.azurecr.io
  IMAGE_NAME: ms-users

jobs:
  build-and-push:
    name: Build and push ms-users image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Azure login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Login to Azure Container Registry
        run: az acr login --name $ACR_NAME

      - name: Diagnose Azure and ACR authorization
        env:
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          EXPECTED_ACR_SUBSCRIPTION_ID: df617ebe-6f79-4935-80eb-a2163b3fe212
        run: |
          set -uo pipefail

          echo "## Azure context"
          CURRENT_SUBSCRIPTION_ID="$(az account show --query id --output tsv 2>/dev/null || true)"
          CURRENT_TENANT_ID="$(az account show --query tenantId --output tsv 2>/dev/null || true)"
          CURRENT_USER_TYPE="$(az account show --query user.type --output tsv 2>/dev/null || true)"
          echo "Current subscription matches expected ACR subscription: $([ "$CURRENT_SUBSCRIPTION_ID" = "$EXPECTED_ACR_SUBSCRIPTION_ID" ] && echo yes || echo no)"
          echo "Current subscription suffix: ${CURRENT_SUBSCRIPTION_ID: -6}"
          echo "Current tenant suffix: ${CURRENT_TENANT_ID: -6}"
          echo "Current user type: ${CURRENT_USER_TYPE}"

          echo "## ACR metadata"
          ACR_ID="$(az acr show --name "$ACR_NAME" --query id --output tsv 2>/tmp/acr_show_error.txt || true)"
          if [ -n "$ACR_ID" ]; then
            echo "ACR found: yes"
            echo "ACR resource id suffix: ${ACR_ID: -80}"
            az acr show \
              --name "$ACR_NAME" \
              --query "{name:name, loginServer:loginServer, sku:sku.name, adminUserEnabled:adminUserEnabled, publicNetworkAccess:publicNetworkAccess, networkRuleBypassOptions:networkRuleBypassOptions, anonymousPullEnabled:anonymousPullEnabled, dataEndpointEnabled:dataEndpointEnabled, policies:policies}" \
              --output json || true

            echo "## Role assignments for configured service principal at ACR scope"
            az role assignment list \
              --assignee "$AZURE_CLIENT_ID" \
              --scope "$ACR_ID" \
              --query "[].{role:roleDefinitionName, principalType:principalType, principalName:principalName, scope:scope}" \
              --output table || true
          else
            echo "ACR found: no"
            echo "::warning::az acr show failed; sanitized error follows. The workflow will continue to build/push so we can validate the Docker data-plane error as well."
            sed -E 's/[0-9a-fA-F-]{36}/***GUID***/g' /tmp/acr_show_error.txt || true
          fi

          echo "## Repository read probe"
          az acr repository list \
            --name "$ACR_NAME" \
            --output table || true

      - name: Set Docker image tags
        id: image
        run: |
          SHORT_SHA="${GITHUB_SHA::7}"
          echo "sha_tag=${ACR_LOGIN_SERVER}/${IMAGE_NAME}:${GITHUB_SHA}" >> "$GITHUB_OUTPUT"
          echo "short_sha_tag=${ACR_LOGIN_SERVER}/${IMAGE_NAME}:${SHORT_SHA}" >> "$GITHUB_OUTPUT"
          echo "latest_tag=${ACR_LOGIN_SERVER}/${IMAGE_NAME}:latest" >> "$GITHUB_OUTPUT"

      - name: Build Docker image
        run: |
          docker build \
            --label org.opencontainers.image.source="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}" \
            --label org.opencontainers.image.revision="${GITHUB_SHA}" \
            --label org.opencontainers.image.created="$(date -u +'%Y-%m-%dT%H:%M:%SZ')" \
            -t "${{ steps.image.outputs.sha_tag }}" \
            -t "${{ steps.image.outputs.short_sha_tag }}" \
            -t "${{ steps.image.outputs.latest_tag }}" \
            .

      - name: Push Docker image
        run: |
          docker push "${{ steps.image.outputs.sha_tag }}"
          docker push "${{ steps.image.outputs.short_sha_tag }}"
          docker push "${{ steps.image.outputs.latest_tag }}"

      - name: Publish image summary
        run: |
          cat <<EOF >> "$GITHUB_STEP_SUMMARY"
          ## ms-users image published

          | Tag | Image |
          |---|---|
          | Full commit SHA | \`${{ steps.image.outputs.sha_tag }}\` |
          | Short commit SHA | \`${{ steps.image.outputs.short_sha_tag }}\` |
          | Latest | \`${{ steps.image.outputs.latest_tag }}\` |
          EOF
